database:
  name: rishart-db
  id: dpg-d8m43v9o3t8c73bls72g-a

services:
  - type: web
    name: rishartinventory-theme
    region: singapore
    plan: free
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: APP_ENV
        value: production
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: rishart-db
          property: connectionString
