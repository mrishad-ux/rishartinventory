database:
  name: rishart-db
  id: dpg-d8m43v9o3t8c73bls72g-a

services:
  - type: web
    name: rishartinventory-theme
    region: singapore
    plan: free
    runtime: node
    rootDir: next-dashboard
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: APP_ENV
        value: production
      - key: NODE_ENV
        value: production
      - key: APP_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: rishart-db
          property: connectionString
      - key: NEXT_PUBLIC_APP_URL
        value: https://rishartinventory-theme.onrender.com
